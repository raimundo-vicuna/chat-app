<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rai/chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #17171a; --surface2: #1e1e22; --surface3: #26262c;
      --border: rgba(255,255,255,0.07); --accent: #7c6af7; --accent2: #a78bfa;
      --text: #f0effe; --muted: #8885a4; --green: #4ade80;
      --font: 'DM Sans', sans-serif; --mono: 'Space Mono', monospace;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); }

    /* ── Pantalla de nombre ── */
    #login-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .login-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px; width: 340px; text-align: center;
    }
    .login-box h1 { font-family: var(--mono); font-size: 20px; color: var(--accent2); margin-bottom: 8px; }
    .login-box p  { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-box input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px; font-size: 14px;
      color: var(--text); font-family: var(--font); outline: none;
      margin-bottom: 12px; transition: border-color .2s;
    }
    .login-box input:focus { border-color: rgba(124,106,247,.5); }
    .color-picker { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
    .color-dot {
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: all .15s;
    }
    .color-dot.selected { border-color: #fff; transform: scale(1.15); }
    .login-btn {
      width: 100%; padding: 12px; background: var(--accent); border: none;
      border-radius: 10px; color: #fff; font-family: var(--font);
      font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s;
    }
    .login-btn:hover { background: var(--accent2); }

    /* ── App ── */
    #app { display: none; }
    .layout { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }

    .sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header {
      padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .logo { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent2); letter-spacing:.05em; }
    .logo span { color: var(--muted); font-weight: 400; }
    #online-badge {
      margin-left: auto; font-size: 10px;
      background: rgba(74,222,128,.12); color: var(--green);
      padding: 2px 8px; border-radius: 20px;
      border: 1px solid rgba(74,222,128,.2); font-family: var(--mono);
    }
    .section-label {
      padding: 14px 16px 6px; font-size: 10px; font-weight: 600;
      letter-spacing:.1em; color: var(--muted); text-transform: uppercase;
    }
    .channel-list { padding: 4px 8px; }
    .channel {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      font-size: 14px; color: var(--muted); transition: all .15s;
    }
    .channel:hover { background: var(--surface2); color: var(--text); }
    .channel.active { background: rgba(124,106,247,.15); color: var(--accent2); }
    .badge {
      margin-left: auto; background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 600; min-width: 18px; height: 18px;
      border-radius: 9px; display: none; align-items: center; justify-content: center;
      padding: 0 5px; font-family: var(--mono);
    }

    .online-list { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }
    .user-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 10px; border-radius: 8px; font-size: 13px;
    }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; flex-shrink: 0;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; margin-left: auto; flex-shrink: 0; background: var(--green); }

    .identity-bar {
      padding: 12px 16px; border-top: 1px solid var(--border);
      background: var(--surface); display: flex; align-items: center; gap: 9px;
    }
    .my-name { font-size: 13px; font-weight: 500; }
    .my-sub  { font-size: 11px; color: var(--muted); font-family: var(--mono); }

    .main { display: flex; flex-direction: column; background: var(--bg); }
    .chat-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; background: var(--surface);
    }
    .chat-title { font-size: 15px; font-weight: 600; }
    .chat-sub   { font-size: 12px; color: var(--muted); }
    #typing-row { margin-left: auto; font-size: 12px; color: var(--muted); min-height: 18px; }
    .typing-dots { display: inline-flex; gap: 3px; align-items: center; }
    .typing-dots span {
      width: 4px; height: 4px; border-radius: 50%; background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay:.2s; }
    .typing-dots span:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

    .messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    .day-label {
      text-align: center; margin: 12px 0; font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 10px;
    }
    .day-label::before,.day-label::after { content:''; flex:1; height:1px; background:var(--border); }

    .msg-row { display:flex; align-items:flex-end; gap:8px; animation: fadeUp .2s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.own { flex-direction: row-reverse; }
    .msg-avatar { width:28px; height:28px; border-radius:50%; font-size:10px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-bottom:2px; }
    .msg-avatar.ghost { opacity:0; }
    .bubble { max-width:340px; padding:9px 13px; border-radius:16px; font-size:14px; line-height:1.5; }
    .bubble.other { background:var(--surface2); border-bottom-left-radius:4px; }
    .bubble.own   { background:var(--accent); border-bottom-right-radius:4px; color:#fff; }
    .bubble-meta { font-size:10px; color:var(--muted); margin-top:3px; padding:0 4px; }
    .msg-row.own .bubble-meta { text-align:right; }
    .sender-name { font-size:11px; font-weight:600; margin-bottom:3px; padding:0 4px; }

    .input-area { padding:14px 16px; border-top:1px solid var(--border); background:var(--surface); }
    .input-row {
      display:flex; align-items:center; gap:10px;
      background:var(--surface2); border:1px solid var(--border);
      border-radius:12px; padding:0 6px 0 14px; transition:border-color .2s;
    }
    .input-row:focus-within { border-color:rgba(124,106,247,.4); }
    .msg-input { flex:1; background:transparent; border:none; outline:none; font-family:var(--font); font-size:14px; color:var(--text); padding:11px 0; }
    .msg-input::placeholder { color:var(--muted); }
    .send-btn { width:34px; height:34px; border-radius:8px; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; color:#fff; font-size:15px; flex-shrink:0; }
    .send-btn:hover { background:var(--accent2); }
    .action-btn { width:30px; height:30px; border-radius:7px; background:transparent; border:none; cursor:pointer; color:var(--muted); font-size:16px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .action-btn:hover { background:var(--surface3); color:var(--text); }

    #conn-status { font-size:11px; padding: 2px 8px; border-radius: 20px; font-family: var(--mono); }
    #conn-status.connected    { background:rgba(74,222,128,.12); color:var(--green);   border:1px solid rgba(74,222,128,.2); }
    #conn-status.disconnected { background:rgba(248,113,113,.12); color:#f87171; border:1px solid rgba(248,113,113,.2); }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>rai/chat</h1>
    <p>Elige tu nombre y color para entrar</p>
    <input id="name-input" type="text" placeholder="Tu nombre..." maxlength="20" />
    <div class="color-picker" id="color-picker"></div>
    <button class="login-btn" onclick="enterChat()">Entrar al chat →</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">rai<span>/chat</span></div>
        <div id="online-badge">● 0 online</div>
      </div>

      <div class="section-label">Canales</div>
      <div class="channel-list">
        <div class="channel active" onclick="switchChannel('general')"># general <span class="badge" id="badge-general"></span></div>


      <div class="section-label">En línea</div>
      <div class="online-list" id="online-list"></div>

      <div class="identity-bar">
        <div class="avatar" id="my-avatar-bar"></div>
        <div>
          <div class="my-name" id="my-name-bar"></div>
          <div class="my-sub">tú</div>
        </div>
        <div id="conn-status" class="disconnected" style="margin-left:auto">● offline</div>
      </div>
    </div>

    <div class="main">
      <div class="chat-header">
        <div>
          <div class="chat-title" id="channel-title"># general</div>
          <div class="chat-sub" id="channel-sub">Canal principal</div>
        </div>
        <div id="typing-row"></div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <div class="input-row">
          <div style="display:flex;gap:4px;margin-right:4px">
            <button class="action-btn" onclick="insertEmoji()"><i class="ti ti-mood-happy" aria-hidden="true"></i></button>
          </div>
          <input class="msg-input" id="msg-input" placeholder="Escribe un mensaje…" onkeydown="handleKey(event)" oninput="handleTyping()" autocomplete="off" />
          <button class="send-btn" onclick="sendMessage()"><i class="ti ti-send" aria-hidden="true"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ── Colores disponibles ── */
  const COLORS = [
    { color: '#a78bfa', bg: 'rgba(167,139,250,0.15)' },
    { color: '#4ade80', bg: 'rgba(74,222,128,0.12)'  },
    { color: '#f87171', bg: 'rgba(248,113,113,0.12)' },
    { color: '#fbbf24', bg: 'rgba(251,191,36,0.12)'  },
    { color: '#38bdf8', bg: 'rgba(56,189,248,0.12)'  },
    { color: '#f472b6', bg: 'rgba(244,114,182,0.12)' },
  ];

  const CHANNELS_INFO = {
    general: { label: '# general', sub: 'Canal principal' },
    random:  { label: '# random',  sub: 'Todo lo demás' },
    tech:    { label: '# tech',    sub: 'Código y tecnología' },
    ideas:   { label: '# ideas',   sub: 'Brainstorming y proyectos' },
  };

  /* ── Estado local ── */
  let myName = '';
  let myColor = COLORS[0].color;
  let myBg    = COLORS[0].bg;
  let currentChannel = 'general';
  const localMessages = { general: [], random: [], tech: [], ideas: [] };
  const unread = { general: 0, random: 0, tech: 0, ideas: 0 };
  const typingNames = {};
  let typingTimer = null;
  let isTyping = false;
  let socket;

  /* ── Color picker ── */
  const picker = document.getElementById('color-picker');
  COLORS.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (i === 0 ? ' selected' : '');
    dot.style.background = c.color;
    dot.onclick = () => {
      myColor = c.color; myBg = c.bg;
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
    };
    picker.appendChild(dot);
  });

  /* ── Enter chat ── */
  function enterChat() {
    const name = document.getElementById('name-input').value.trim();
    if (!name) { document.getElementById('name-input').focus(); return; }
    myName = name;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    updateIdentityBar();
    connectSocket();
  }
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') enterChat();
  });

  /* ── Identity bar ── */
  function updateIdentityBar() {
    const av = document.getElementById('my-avatar-bar');
    av.textContent = myName[0].toUpperCase();
    av.style.background = myBg;
    av.style.color = myColor;
    document.getElementById('my-name-bar').textContent = myName;
  }

  /* ── Socket ── */
  function connectSocket() {
    socket = io();

    socket.on('connect', () => {
      setStatus(true);
      socket.emit('join', { channel: currentChannel, name: myName, color: myColor, bg: myBg });
    });

    socket.on('disconnect', () => setStatus(false));

    // Historial al conectar
    socket.on('history', (hist) => {
      for (const ch in hist) {
        localMessages[ch] = hist[ch] || [];
      }
      renderMessages();
    });

    // Mensaje nuevo
    socket.on('message', ({ channel, sender, text, color, bg, time }) => {
      const msg = { sender, text, color, bg, time };
      if (!localMessages[channel]) localMessages[channel] = [];
      localMessages[channel].push(msg);
      if (channel === currentChannel) {
        appendMessage(msg);
      } else {
        unread[channel] = (unread[channel] || 0) + 1;
        const b = document.getElementById('badge-' + channel);
        b.style.display = 'flex';
        b.textContent = unread[channel];
      }
    });

    // Typing
    socket.on('typing', ({ name }) => {
      typingNames[name] = true;
      renderTyping();
    });
    socket.on('stop-typing', ({ name }) => {
      delete typingNames[name];
      renderTyping();
    });

    // Usuarios online
    socket.on('online-users', (users) => {
      document.getElementById('online-badge').textContent = `● ${users.length} online`;
      const list = document.getElementById('online-list');
      list.innerHTML = '';
      users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'user-item';
        const isMe = u.name === myName;
        div.innerHTML = `
          <div class="avatar" style="background:${u.bg};color:${u.color}">${u.name[0].toUpperCase()}</div>
          <span style="font-size:13px">${u.name}${isMe ? ' <span style="color:var(--muted);font-size:11px">(tú)</span>' : ''}</span>
          <div class="dot"></div>`;
        list.appendChild(div);
      });
    });
  }

  function setStatus(online) {
    const el = document.getElementById('conn-status');
    el.textContent = online ? '● online' : '● offline';
    el.className = online ? 'connected' : 'disconnected';
  }

  /* ── Canales ── */
  function switchChannel(ch) {
    if (socket) socket.emit('join', { channel: ch, name: myName, color: myColor, bg: myBg });
    currentChannel = ch;
    unread[ch] = 0;
    const b = document.getElementById('badge-' + ch);
    b.style.display = 'none';
    document.querySelectorAll('.channel').forEach(el => {
      el.classList.toggle('active', el.textContent.trim().startsWith(ch));
    });
    document.getElementById('channel-title').textContent = CHANNELS_INFO[ch].label;
    document.getElementById('channel-sub').textContent   = CHANNELS_INFO[ch].sub;
    renderMessages();
  }

  /* ── Render mensajes ── */
  function renderMessages() {
    const container = document.getElementById('messages');
    container.innerHTML = '';
    const msgs = localMessages[currentChannel] || [];
    if (!msgs.length) {
      container.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;margin:auto;padding:40px 0">No hay mensajes aún. ¡Sé el primero!</div>';
      return;
    }
    const dl = document.createElement('div');
    dl.className = 'day-label'; dl.textContent = 'Hoy';
    container.appendChild(dl);
    let lastSender = null;
    msgs.forEach(m => {
      appendMessageToContainer(container, m, lastSender);
      lastSender = m.sender;
    });
    container.scrollTop = container.scrollHeight;
  }

  function appendMessage(m) {
    const container = document.getElementById('messages');
    const msgs = localMessages[currentChannel];
    const lastSender = msgs.length > 1 ? msgs[msgs.length - 2].sender : null;
    appendMessageToContainer(container, m, lastSender);
    container.scrollTop = container.scrollHeight;
  }

  function appendMessageToContainer(container, m, lastSender) {
    const isOwn = m.sender === myName;
    const showAvatar = lastSender !== m.sender;

    const row = document.createElement('div');
    row.className = 'msg-row' + (isOwn ? ' own' : '');

    const avDiv = document.createElement('div');
    avDiv.className = 'msg-avatar' + (showAvatar ? '' : ' ghost');
    if (showAvatar) {
      avDiv.textContent = m.sender[0].toUpperCase();
      avDiv.style.background = m.bg || 'rgba(124,106,247,0.15)';
      avDiv.style.color = m.color || '#a78bfa';
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (isOwn ? 'own' : 'other');
    let html = '';
    if (showAvatar && !isOwn) {
      html += `<div class="sender-name" style="color:${m.color || '#a78bfa'}">${m.sender}</div>`;
    }
    html += escapeHtml(m.text);
    bubble.innerHTML = html;

    const metaRow = document.createElement('div');
    metaRow.className = 'msg-row' + (isOwn ? ' own' : '');
    const meta = document.createElement('div');
    meta.className = 'bubble-meta'; meta.textContent = m.time;
    const spacer = document.createElement('div');
    spacer.style.width = '28px';

    if (isOwn) { row.appendChild(bubble); row.appendChild(avDiv); metaRow.appendChild(meta); metaRow.appendChild(spacer); }
    else        { row.appendChild(avDiv); row.appendChild(bubble); metaRow.appendChild(spacer); metaRow.appendChild(meta); }

    container.appendChild(row);
    container.appendChild(metaRow);
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Enviar ── */
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !socket) return;
    socket.emit('message', { channel: currentChannel, sender: myName, text, color: myColor, bg: myBg });
    input.value = '';
    stopTyping();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  /* ── Typing ── */
  function handleTyping() {
    if (!isTyping && socket) {
      isTyping = true;
      socket.emit('typing', { channel: currentChannel, name: myName });
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(stopTyping, 2000);
  }

  function stopTyping() {
    if (isTyping && socket) {
      isTyping = false;
      socket.emit('stop-typing', { channel: currentChannel, name: myName });
    }
  }

  function renderTyping() {
    const row = document.getElementById('typing-row');
    const names = Object.keys(typingNames).filter(n => n !== myName);
    if (!names.length) { row.innerHTML = ''; return; }
    const who  = names.length === 1 ? names[0] : names.join(' y ');
    const verb = names.length === 1 ? 'está escribiendo' : 'están escribiendo';
    row.innerHTML = `<span style="display:inline-flex;align-items:center;gap:6px">${who} ${verb} <span class="typing-dots"><span></span><span></span><span></span></span></span>`;
  }

  function insertEmoji() {
    const emojis = ['😄','🚀','💡','🔥','✨','👀','🎯','🤔','😎','👋'];
    const input = document.getElementById('msg-input');
    input.value += emojis[Math.floor(Math.random() * emojis.length)];
    input.focus();
  }
</script>
</body>
</html>
